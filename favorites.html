<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellissimo - Sevimlilar</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Central Styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body id="favorites-page">

    <!-- Header Section -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo-link">
                <img src="images/logo2.png" alt="Bellissimo Logo" class="logo-img">
                            </a>

            <nav class="desktop-nav">
                <a href="index.html" class="nav-link">Asosiy</a>
                <a href="cart.html" class="nav-link">Savatcha <span class="cart-badge nav-cart-badge">0</span></a>
                <a href="orders.html" class="nav-link">Buyurtmalar</a>
                <a href="favorites.html" class="nav-link active">Sevimlilar</a>
            </nav>

            <div class="header-actions">
                <button class="location-selector" title="Yetkazib berish manzili">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg" style="color: var(--pink-accent);">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"></path>
                    </svg>
                    <span>Navoiy shahri, Navoiy</span>
                </button>

                <!-- Shown when logged in -->
                <div id="desktop-auth-actions" style="display: none; align-items: center; gap: 8px;">
                    <button class="action-btn" title="Bildirishnomalar">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                        </svg>
                        <span class="badge">1</span>
                    </button>
                    <a href="profile.html" class="action-btn" title="Profil">
                        <img src="images/avatar.svg" alt="Profil" style="width: 22px; height: 22px; border-radius: 50%;">
                    </a>
                </div>
                <!-- Shown when NOT logged in -->
                <a href="login.html" id="desktop-login-btn" class="btn-primary" style="display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 30px; font-size: 14px; font-weight: 700; text-decoration: none; background: var(--pink-gradient); color: #fff; box-shadow: 0 4px 15px rgba(209,26,91,0.25);">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path><polyline points="10 17 15 12 10 7"></polyline><line x1="15" y1="12" x2="3" y2="12"></line></svg>
                    Kirish
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="min-height: 70vh;">
        <h2 class="cart-title" style="margin-top: 30px;">Saralangan mahsulotlaringiz</h2>
        
        <div id="favorites-grid" class="products-grid" style="margin-top: 20px;">
            <!-- Rendered via JS -->
        </div>


    </main>



    <!-- Mobile Navigation -->
    <nav class="mobile-bottom-nav">
        <div class="mobile-nav-container">
            <a href="index.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                </svg>
                <span>Asosiy</span>
            </a>
            <a href="cart.html" class="mobile-nav-item">
                <div class="mobile-cart-icon-wrapper">
                    <img src="images/korzinka.svg" alt="Savatcha" style="width: 22px; height: 22px; object-fit: contain;">
                    <span class="cart-badge badge">0</span>
                </div>
                <span>Savatcha</span>
            </a>
            <a href="orders.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"></path>
                    <rect x="9" y="3" width="6" height="4" rx="2" ry="2"></rect>
                    <path d="M9 14h6"></path>
                    <path d="M9 18h6"></path>
                    <path d="M9 10h6"></path>
                </svg>
                <span>Buyurtmalar</span>
            </a>
            <a href="profile.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profil</span>
            </a>
        </div>
    </nav>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
