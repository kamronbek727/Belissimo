<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellissimo - Savatcha</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Central Styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body id="cart-page">

    <!-- Header Section -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo-link">
                <img src="images/logo2.png" alt="Bellissimo Logo" class="logo-img">
                            </a>

            <nav class="desktop-nav">
                <a href="index.html" class="nav-link">Asosiy</a>
                <a href="orders.html" class="nav-link">Buyurtmalar</a>
                <a href="favorites.html" class="nav-link">Sevimlilar</a>
            </nav>

            <div class="header-actions">
                <button class="location-selector" title="Yetkazib berish manzili">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg" style="color: var(--pink-accent);">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"></path>
                    </svg>
                    <span>Navoiy shahri, Navoiy</span>
                </button>

                <button class="action-btn" title="Bildirishnomalar">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="badge">1</span>
                </button>


                <a href="profile.html" class="action-btn" title="Profil">
                    <img src="images/avatar.svg" alt="Profil" style="width: 22px; height: 22px; border-radius: 50%;">
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="min-height: 70vh; padding-top: 30px;">
        <div id="cart-content-layout" class="cart-layout" style="display: none;">
            <!-- Cart items panel -->
            <div class="cart-items-panel">
                <h3 class="cart-title">Sizning savatchangiz</h3>
                <div id="cart-items-list">
                    <!-- Dynamic rendering in JS -->
                </div>
            </div>
            
            <!-- Summary checkout panel -->
            <div class="cart-summary-panel">
                <h3 class="summary-title">Buyurtma tafsilotlari</h3>
                <div class="summary-row">
                    <span>Taomlar narxi:</span>
                    <span id="cart-subtotal">0 so'm</span>
                </div>
                <div class="summary-row">
                    <span>Yetkazib berish:</span>
                    <span id="cart-delivery">10 000 so'm</span>
                </div>
                <div class="summary-row total">
                    <span>Jami summa:</span>
                    <span id="cart-total">0 so'm</span>
                </div>
                <button id="btn-checkout" class="btn-checkout">Buyurtma berish</button>
            </div>
        </div>

        <div id="empty-cart-view" class="empty-cart-view" style="display: none;">
            <img src="images/korzinka.svg" alt="Empty Cart" class="empty-cart-img">
            <h3 class="cart-title" style="font-size: 22px;">Savatchangiz hozircha bo'sh</h3>

            <a href="index.html" class="btn-go-home">Menyuni ko'rish</a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container footer-container">
            <a href="index.html" class="logo-link">
                <img src="images/logo2.png" alt="Bellissimo Logo" class="logo-img" style="height: 28px; width: auto; object-fit: contain;">
                <span class="logo-text" style="font-size: 20px;">Bellissimo</span>
            </a>
            <p class="footer-copyright">© 2026 Bellissimo. Barcha huquqlar himoyalangan.</p>
        </div>
    </footer>

    <!-- Mobile Navigation -->
    <nav class="mobile-bottom-nav">
        <div class="mobile-nav-container">
            <a href="index.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                </svg>
                <span>Asosiy</span>
            </a>
            <a href="orders.html" class="mobile-nav-item">
                <img src="images/korzinka.svg" alt="Buyurtmalar" style="width: 22px; height: 22px; object-fit: contain;">
                <span>Buyurtmalar</span>
            </a>
            <a href="favorites.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <span>Sevimlilar</span>
            </a>
            <a href="profile.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profil</span>
            </a>
        </div>
    </nav>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
