<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bellissimo - Profil</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Central Styling -->
    <link rel="stylesheet" href="style.css">
</head>
<body id="profile-page">

    <!-- Header Section -->
    <header class="header">
        <div class="container header-container">
            <a href="index.html" class="logo-link">
                <img src="images/logo2.png" alt="Bellissimo Logo" class="logo-img">
                            </a>

            <nav class="desktop-nav">
                <a href="index.html" class="nav-link">Asosiy</a>
                <a href="orders.html" class="nav-link">Buyurtmalar</a>
                <a href="favorites.html" class="nav-link">Sevimlilar</a>
            </nav>

            <div class="header-actions">
                <button class="location-selector" title="Yetkazib berish manzili">
                    <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg" style="color: var(--pink-accent);">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"></path>
                    </svg>
                    <span>Navoiy shahri, Navoiy</span>
                </button>

                <button class="action-btn" title="Bildirishnomalar">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <span class="badge">1</span>
                </button>


                <a href="profile.html" class="action-btn active" title="Profil">
                    <img src="images/avatar.svg" alt="Profil" style="width: 22px; height: 22px; border-radius: 50%;">
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="max-width: 500px; padding: 10px 20px; min-height: 60vh;">
        <h2 class="cart-title" style="margin-top: 0; margin-bottom: 20px;">Profil</h2>
        <!-- User Info Card (Dark style matching the screenshot) -->
        <div class="user-info-card" style="background-color: #262626; color: #fff; padding: 24px; border-radius: 20px; text-align: left; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
            <div style="font-size: 16px; color: #8e8e93; margin-bottom: 6px; font-weight: 500;" id="profile-full-name">Mehmon</div>
            <div style="font-size: 24px; font-weight: 700; color: #fff;" id="profile-phone-number">+998 (93) 632 54 94</div>
        </div>

        <!-- Menu Item: Shaxsiy ma'lumotlar (Accordion) -->
        <div class="profile-menu-container" style="margin-bottom: 20px;">
            <button id="btn-personal-info" class="profile-menu-item" style="display: flex; justify-content: space-between; align-items: center; background-color: #f8f9fc; padding: 18px 24px; border-radius: 16px; transition: background-color 0.2s; border: 1px solid var(--border-color); text-decoration: none; width: 100%; cursor: pointer; text-align: left;">
                <span style="font-size: 16px; font-weight: 600; color: var(--text-dark); font-family: 'Outfit', sans-serif;">Shaxsiy ma'lumotlar</span>
                <svg id="caret-icon" stroke="currentColor" fill="none" stroke-width="2.5" viewBox="0 0 24 24" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg" style="color: #2ecc71; transition: transform 0.2s;">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>

            <!-- Personal Info Details (Hidden by default) -->
            <div id="personal-info-details" style="display: none; background-color: #fff; border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 16px 16px; padding: 20px; margin-top: -1px; box-shadow: var(--shadow-soft);">
                <div class="form-group" style="margin-bottom: 16px; text-align: left;">
                    <label class="form-label" style="font-size: 14px; font-weight: 600; color: var(--dark-purple); display: block; margin-bottom: 6px;">Ism familiya</label>
                    <input type="text" id="edit-profile-name" class="form-input" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 15px;" placeholder="Ismingizni kiriting">
                </div>
                <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                    <label class="form-label" style="font-size: 14px; font-weight: 600; color: var(--dark-purple); display: block; margin-bottom: 6px;">Telefon raqam</label>
                    <input type="text" id="edit-profile-phone" class="form-input" style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 10px; font-size: 15px; background-color: #eee; cursor: not-allowed;" readonly>
                </div>
                <button id="btn-save-profile" class="btn-login" style="width: 100%; padding: 12px; border-radius: 20px; font-size: 15px; font-weight: 700;">Saqlash</button>
            </div>
        </div>

        <!-- Logout button -->
        <button id="btn-logout" class="btn-logout" style="margin-top: 40px; width: 100%;">Tizimdan chiqish</button>
    </main>



    <!-- Mobile Navigation -->
    <nav class="mobile-bottom-nav">
        <div class="mobile-nav-container">
            <a href="index.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"></path>
                </svg>
                <span>Asosiy</span>
            </a>
            <a href="orders.html" class="mobile-nav-item">
                <img src="images/korzinka.svg" alt="Buyurtmalar" style="width: 22px; height: 22px; object-fit: contain;">
                <span>Buyurtmalar</span>
            </a>
            <a href="favorites.html" class="mobile-nav-item">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <span>Sevimlilar</span>
            </a>
            <a href="profile.html" class="mobile-nav-item active">
                <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Profil</span>
            </a>
        </div>
    </nav>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
